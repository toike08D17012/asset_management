services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: npm run dev -- -H 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: ./data/asset_management.db
      SESSION_SECRET: dev-session-secret-change-me
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
